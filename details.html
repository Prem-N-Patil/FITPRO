<!DOCTYPE html>
<html>
<head>
    <title>FITPRO - DETAILS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
<div class="details-container">
    <h2><b>Personal Deatils</b></h2>
    <p>Tell us more about you</p>

    <div class="form-group">
    <label>Age</label>
    <input type="text" placeholder="Enter your age" id="age">
    </div>

    <div class="form-group">
    <label>Weight</label>
    <input type="text" placeholder="Enter your weight in kgs" id="weight">
    </div>

    <div class="form-group">
    <label>Height</label>
    <input type="text" placeholder="Enter your height in cms" id="height">
    </div>

    <button type="button" onclick="saveDetails()">NEXT</button>

    <div class="back-link" onclick="goBack()">Back to previous page</div>

</div>

<script src="script.js"></script>
</body>
</html>
