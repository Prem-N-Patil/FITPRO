<!DOCTYPE html>
<html>
<head>
    <title>FITPRO - Sign up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="signup-container">
    <h2><b>Welcome to FITPRO</b></h2>
    <p>Create an account</p>

    

    <button class="google-btn" onclick="googleLogin()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/IOS_Google_icon.png" width="20">
        Continue with Google
    </button>

    <div class="divider">
        <span>or</span>
    </div>
    


    <label>Your Name</label>
    <input type="text" placeholder="eg.: Enter your name" id="name">

    <label>Email Address</label>
    <input type="email" placeholder="eg.: welcometofitpro@gmail.com" id="email">

    <label>Password</label>
    <input type="password" placeholder="Enter your password" id="password">

    <button type="button" onclick="goNext()">SIGN UP</button>
        
    <div class="back-link" onclick="goBack()">Back to previous page</div>
    
</div>

<script src="script.js"></script>

</body>
</html>
